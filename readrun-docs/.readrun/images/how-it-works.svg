<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#656d76"/>
    </marker>
  </defs>

  <!-- Markdown files box -->
  <rect x="20" y="50" width="160" height="100" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="100" y="85" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">Markdown files</text>
  <text x="100" y="108" text-anchor="middle" font-size="12" fill="#656d76">notes/*.md</text>
  <text x="100" y="126" text-anchor="middle" font-size="12" fill="#656d76">.readrun/scripts/</text>
  <text x="100" y="144" text-anchor="middle" font-size="12" fill="#656d76">.readrun/images/</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="100" x2="250" y2="100" stroke="#656d76" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- readrun box -->
  <rect x="260" y="60" width="140" height="80" rx="10" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text x="330" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="#0969da">readrun</text>
  <text x="330" y="115" text-anchor="middle" font-size="12" fill="#656d76">dev server / build</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="100" x2="470" y2="100" stroke="#656d76" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Website box -->
  <rect x="480" y="40" width="220" height="120" rx="10" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="590" y="75" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2328">Interactive website</text>
  <text x="590" y="98" text-anchor="middle" font-size="12" fill="#656d76">Sidebar navigation</text>
  <text x="590" y="116" text-anchor="middle" font-size="12" fill="#656d76">Runnable code blocks</text>
  <text x="590" y="134" text-anchor="middle" font-size="12" fill="#656d76">Embedded images</text>
  <text x="590" y="152" text-anchor="middle" font-size="12" fill="#656d76">Themes &amp; shortcuts</text>
</svg>
